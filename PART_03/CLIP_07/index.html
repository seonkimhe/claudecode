<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날씨 앱</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%E2%98%80%EF%B8%8F</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>날씨</h1>
      <form id="search-form" autocomplete="off">
        <input type="text" id="city-input" placeholder="도시 이름 검색 (예: 서울)" required>
        <button type="submit">검색</button>
        <button type="button" id="locate-btn" title="현재 위치 사용">📍</button>
      </form>
    </header>

    <main>
      <div id="status" class="status"></div>

      <section id="current-weather" class="current-weather hidden">
        <h2 id="location-name"></h2>
        <p id="location-time"></p>
        <div class="current-main">
          <span id="current-icon" class="icon"></span>
          <span id="current-temp" class="temp"></span>
        </div>
        <p id="current-desc" class="desc"></p>
        <div class="details">
          <div><span>체감온도</span><strong id="feels-like"></strong></div>
          <div><span>습도</span><strong id="humidity"></strong></div>
          <div><span>풍속</span><strong id="wind"></strong></div>
        </div>
      </section>

      <section id="forecast" class="forecast hidden">
        <h3>5일 예보</h3>
        <div id="forecast-list" class="forecast-list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
